name: Setup Go (cached)
description: Install Go with module caching

inputs:
  go-mod-path:
    description: Path to go.mod file
    required: true
  go-sum-path:
    description: Path to go.sum file
    required: true

runs:
  using: composite
  steps:
    - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417  # v6
      with:
        go-version-file: ${{ inputs.go-mod-path }}
        cache-dependency-path: ${{ inputs.go-sum-path }}
