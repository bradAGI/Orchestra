name: 🔒 Binary Protection Check

# ==============================================================================
# 🛡️ GITHUB ACTIONS - BINARY FILE PROTECTION
# ==============================================================================
# This workflow provides CI/CD level protection against binary files being
# committed to the repository. It runs on every push and pull request.

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  binary-protection:
    name: 🔍 Scan for Binary Files
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Full history to check all files

    - name: 🔍 Scan for Orchestra Binaries
      run: |
        echo "🔍 Orchestra Binary Protection: Scanning repository..."

        # Critical Orchestra binary patterns
        ORCHESTRA_BINARIES=(
          "orchestrd"
          "orchestra-dash"
          "apps/backend/orchestrd*"
          "apps/tui/orchestra*"
        )

        FOUND_BINARIES=()

        # Check for Orchestra binaries
        for pattern in "${ORCHESTRA_BINARIES[@]}"; do
          if find . -name "$pattern" -type f | grep -v ".git" | grep -q .; then
            FOUND_BINARIES+=($(find . -name "$pattern" -type f | grep -v ".git"))
          fi
        done

        if [ ${#FOUND_BINARIES[@]} -gt 0 ]; then
          echo "🚫 =============================================="
          echo "🚫 CRITICAL: ORCHESTRA BINARIES DETECTED!"
          echo "🚫 =============================================="
          echo ""
          echo "The following Orchestra binaries were found:"
          for file in "${FOUND_BINARIES[@]}"; do
            echo "  ❌ $file"
          done
          echo ""
          echo "🔧 These should be in .gitignore, not committed!"
          echo "🚫 =============================================="
          exit 1
        fi

        echo "✅ No Orchestra binaries found"

    - name: 🔍 Scan for Generic Binaries
      run: |
        echo "🔍 Scanning for generic binary files..."

        # Generic binary patterns to check
        BINARY_EXTENSIONS=(
          "*.exe"
          "*.bin"
          "*.dll"
          "*.so"
          "*.dylib"
          "*.a"
          "*.o"
        )

        FOUND_GENERICS=()

        # Check for generic binaries (excluding node_modules)
        for pattern in "${BINARY_EXTENSIONS[@]}"; do
          if find . -name "$pattern" -type f -not -path "./node_modules/*" -not -path "./.git/*" | grep -q .; then
            FOUND_GENERICS+=($(find . -name "$pattern" -type f -not -path "./node_modules/*" -not -path "./.git/*"))
          fi
        done

        if [ ${#FOUND_GENERICS[@]} -gt 0 ]; then
          echo "⚠️  Generic binary files detected:"
          for file in "${FOUND_GENERICS[@]}"; do
            echo "  📁 $file"
          done
          echo ""
          echo "💡 Verify these should be committed or add to .gitignore"
          # Don't fail on generic binaries, just warn
        else
          echo "✅ No generic binaries found"
        fi

    - name: 🔍 Check for Large Files
      run: |
        echo "🔍 Checking for large files (>10MB)..."

        # Find files larger than 10MB
        LARGE_FILES=$(find . -type f -size +10M -not -path "./.git/*" -not -path "./node_modules/*" || true)

        if [ -n "$LARGE_FILES" ]; then
          echo "⚠️  Large files detected (>10MB):"
          echo "$LARGE_FILES" | while read file; do
            if [ -n "$file" ]; then
              SIZE=$(du -h "$file" | cut -f1)
              echo "  📦 $file ($SIZE)"
            fi
          done
          echo ""
          echo "💡 Consider using Git LFS for large files"
          # Don't fail on large files, just warn
        else
          echo "✅ No large files found"
        fi

    - name: 🔍 Verify .gitignore Coverage
      run: |
        echo "🔍 Verifying .gitignore patterns..."

        # Key patterns that should be in .gitignore
        REQUIRED_PATTERNS=(
          "orchestrd"
          "*.exe"
          "*.bin"
          "*.db"
          ".env"
        )

        MISSING_PATTERNS=()

        for pattern in "${REQUIRED_PATTERNS[@]}"; do
          if ! grep -q "$pattern" .gitignore; then
            MISSING_PATTERNS+=("$pattern")
          fi
        done

        if [ ${#MISSING_PATTERNS[@]} -gt 0 ]; then
          echo "⚠️  Missing .gitignore patterns:"
          for pattern in "${MISSING_PATTERNS[@]}"; do
            echo "  📝 $pattern"
          done
          echo ""
          echo "💡 Consider adding these patterns to .gitignore"
        else
          echo "✅ Key patterns found in .gitignore"
        fi

    - name: ✅ Summary
      run: |
        echo ""
        echo "🛡️  =============================================="
        echo "🛡️  BINARY PROTECTION CHECK COMPLETED"
        echo "🛡️  =============================================="
        echo ""
        echo "✅ Orchestra binaries: Protected"
        echo "✅ Repository scan: Complete"
        echo "✅ Protection layers: Active"
        echo ""
        echo "🔒 Your repository is protected against binary bloat!"
        echo "🛡️  =============================================="