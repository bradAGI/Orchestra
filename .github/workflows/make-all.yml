name: make-all

on:
  pull_request:
    paths:
      - 'apps/tui/**'
      - 'Makefile'
      - '.github/workflows/make-all.yml'
  push:
    branches:
      - main
    paths:
      - 'apps/tui/**'
      - 'Makefile'
      - '.github/workflows/make-all.yml'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  make-all:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: apps/tui/go.mod
          cache-dependency-path: apps/tui/go.sum

      - name: Run TUI tests
        run: cd apps/tui && go test ./...

      - name: Verify make build
        run: make build
