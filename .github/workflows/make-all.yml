name: make-all

on:
  pull_request:
    paths:
      - 'apps/tui/**'
      - 'Makefile'
      - '.github/workflows/make-all.yml'
  push:
    branches:
      - main
    paths:
      - 'apps/tui/**'
      - 'Makefile'
      - '.github/workflows/make-all.yml'

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  make-all:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up Go
        uses: ./.github/actions/setup-go-cached
        with:
          go-mod-path: apps/tui/go.mod
          go-sum-path: apps/tui/go.sum

      - name: Run TUI tests
        run: cd apps/tui && go test -coverprofile=coverage.out ./...

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7
        with:
          name: tui-coverage
          path: apps/tui/coverage.out

      - name: Run TUI tests
        run: cd apps/tui && go test ./...

      - name: Verify make build
        run: make build
