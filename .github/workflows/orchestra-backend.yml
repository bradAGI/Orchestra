name: orchestra-backend

on:
  pull_request:
    paths:
      - 'apps/backend/**'
      - '.github/workflows/orchestra-backend.yml'
      - '.github/scripts/check-orchestra-naming.sh'
  push:
    branches:
      - main
    paths:
      - 'apps/backend/**'
      - '.github/workflows/orchestra-backend.yml'
      - '.github/scripts/check-orchestra-naming.sh'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: apps/backend/go.mod
          cache-dependency-path: apps/backend/go.sum

      - name: Verify formatting
        run: |
          test -z "$(gofmt -l ./cmd ./internal)"

      - name: Go vet
        run: go vet ./...

      - name: Run unit/integration tests
        run: go test ./...

  backend-race-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: apps/backend/go.mod
          cache-dependency-path: apps/backend/go.sum

      - name: Run race tests
        run: go test -race ./...

  naming-guard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Check Orchestra naming guard
        run: .github/scripts/check-orchestra-naming.sh
