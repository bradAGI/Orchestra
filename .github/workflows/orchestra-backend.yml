name: orchestra-backend

on:
  pull_request:
    paths:
      - 'apps/backend/**'
      - '.github/workflows/orchestra-backend.yml'
      - '.github/scripts/check-orchestra-naming.sh'
  push:
    branches:
      - main
    paths:
      - 'apps/backend/**'
      - '.github/workflows/orchestra-backend.yml'
      - '.github/scripts/check-orchestra-naming.sh'

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GOWORK: 'off'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up Go
        uses: ./.github/actions/setup-go-cached
        with:
          go-mod-path: apps/backend/go.mod
          go-sum-path: apps/backend/go.sum

      - name: Verify formatting
        run: |
          test -z "$(gofmt -l ./cmd ./internal)"

      - name: Go vet
        run: go vet ./...

      - name: Run unit/integration tests
        run: go test -coverprofile=coverage.out ./...

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7
        with:
          name: backend-coverage
          path: apps/backend/coverage.out

  backend-race-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up Go
        uses: ./.github/actions/setup-go-cached
        with:
          go-mod-path: apps/backend/go.mod
          go-sum-path: apps/backend/go.sum

      - name: Run race tests
        run: go test -race ./...

  naming-guard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Check Orchestra naming guard
        run: .github/scripts/check-orchestra-naming.sh
