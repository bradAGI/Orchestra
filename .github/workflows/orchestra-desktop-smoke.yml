name: orchestra-desktop-smoke

on:
  pull_request:
    paths:
      - 'apps/desktop/**'
      - 'apps/backend/**'
      - '.github/workflows/orchestra-desktop-smoke.yml'
  push:
    branches:
      - main
    paths:
      - 'apps/desktop/**'
      - 'apps/backend/**'
      - '.github/workflows/orchestra-desktop-smoke.yml'
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  desktop-smoke:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/desktop

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up Node
        uses: ./.github/actions/setup-node-cached
        with:
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Set up Go
        uses: ./.github/actions/setup-go-cached
        with:
          go-mod-path: apps/backend/go.mod
          go-sum-path: apps/backend/go.sum

      - name: Install dependencies
        run: npm ci

      - name: Run desktop release gate
        run: npm run release:gate

      - name: Upload release-readiness report artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: orchestra-desktop-release-readiness-report
          path: apps/desktop/reports
          if-no-files-found: ignore
