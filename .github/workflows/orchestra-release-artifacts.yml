name: orchestra-release-artifacts

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-artifacts:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up Go
        uses: ./.github/actions/setup-go-cached
        with:
          go-mod-path: apps/backend/go.mod
          go-sum-path: apps/backend/go.sum

      - name: Build Orchestra binaries
        run: |
          mkdir -p dist/orchestra
          go build -o dist/orchestra/orchestrad ./cmd/orchestrad
          go build -o dist/orchestra/orchestra ./cmd/orchestra

      - name: Upload Orchestra artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7
        with:
          name: orchestra-backend-artifacts
          path: apps/backend/dist/orchestra
