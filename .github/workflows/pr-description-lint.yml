name: pr-description-lint

on:
  pull_request:
    types: [opened, edited, reopened, synchronize, ready_for_review]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-pr-description:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up Go
        uses: ./.github/actions/setup-go-cached
        with:
          go-mod-path: apps/backend/go.mod
          go-sum-path: apps/backend/go.sum

      - name: Write PR body to file
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        shell: bash
        run: printf '%s' "${PR_BODY}" > /tmp/pr_body.md

      - name: Validate PR description format
        run: go run ./apps/backend/cmd/orchestra check-pr-body /tmp/pr_body.md
