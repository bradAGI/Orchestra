<!doctype html>
<html lang="en">
  <head>
    <script type="module">
      if (import.meta.env.DEV) {
        import("react-grab");
      }
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Orchestra Desktop</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Scale the app: 0.6 in Electron (smaller window), 0.8 in browser (larger window)
      (function() {
        var isElectron = typeof window.orchestraDesktop !== 'undefined' || navigator.userAgent.indexOf('Electron') !== -1;
        var scale = isElectron ? 0.6 : 0.8;
        var size = (100 / scale).toFixed(3);
        var root = document.getElementById('root');
        root.style.transform = 'scale(' + scale + ')';
        root.style.transformOrigin = '0 0';
        root.style.width = size + 'vw';
        root.style.height = size + 'vh';
        root.style.overflow = 'hidden';
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
  </html>
