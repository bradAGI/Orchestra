      parameters:
        - $ref: '#/components/parameters/UsageProvider'
        - $ref: '#/components/parameters/UsageScope'
        - $ref: '#/components/parameters/UsageRange'
        - name: limit
          in: query
          schema:
            type: integer
            default: 25
            maximum: 200
      responses:
        '200':
          description: Session rows.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UsageSession'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
