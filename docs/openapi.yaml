          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsageScanState'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/usage/{provider}/enabled:
    post:
      tags: [Usage]
      summary: Enable/disable usage tracking
      parameters:
        - $ref: '#/components/parameters/UsageProvider'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [enabled]
              properties:
                enabled:
                  type: boolean
      responses:
        '200':
          description: Updated scan state.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsageScanState'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/usage/{provider}/refresh:
    post:
      tags: [Usage]
      summary: Refresh usage data
      description: Triggers a re-scan of the provider's usage files.
      parameters:
        - $ref: '#/components/parameters/UsageProvider'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                force:
                  type: boolean
                  description: Force re-scan even if data appears current.
      responses:
        '200':
          description: Updated scan state after refresh.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsageScanState'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          description: Refresh failed (partial state attached under `details.state`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/usage/{provider}/summary:
    get:
      tags: [Usage]
      summary: Usage summary
      description: Returns aggregated token usage and cost for the given provider, scope, and range.
      parameters:
        - $ref: '#/components/parameters/UsageProvider'
        - $ref: '#/components/parameters/UsageScope'
        - $ref: '#/components/parameters/UsageRange'
      responses:
