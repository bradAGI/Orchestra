        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Saved.
          content:
            application/json:
              schema:
                type: object
        '401':
          $ref: '#/components/responses/Unauthorized'

    delete:
      tags: [Runtimes]
      summary: Delete Kubernetes config
      responses:
        '204':
          description: Deleted.
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/config/kubernetes/test:
    get:
      tags: [Runtimes]
      summary: Test Kubernetes connection
      responses:
        '200':
          description: Test result.
          content:
            application/json:
              schema:
                type: object
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/config/agent-providers:
    get:
      tags: [Agents]
      summary: Get agent provider API keys
      description: Returns configured API keys for embedded agent providers (for the embedded agent widget).
      responses:
        '200':
          description: Provider config.
          content:
            application/json:
              schema:
                type: object
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      tags: [Agents]
      summary: Save agent provider API key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Saved.
          content:
            application/json:
              schema:
                type: object
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/telemetry/health:
    get:
      tags: [Health]
      summary: Telemetry health
      description: Returns whether the warehouse database is healthy.
      responses:
        '200':
          description: Telemetry health.
          content:
            application/json:
              schema:
                type: object
                properties:
                  healthy:
                    type: boolean
        '401':
          $ref: '#/components/responses/Unauthorized'

  responses:
    Unauthorized:
      description: Missing or invalid bearer token.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    BadRequest:
      description: Bad request (invalid JSON, missing required fields, or constraint violation).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: Path not within an authorized project or workspace root.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    InternalError:
      description: Unexpected server error.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    ServiceUnavailable:
      description: Service dependency unavailable (e.g. database not initialized).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    BadGateway:
      description: Upstream GitHub API error.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  parameters:
    IssueIdentifier:
      name: issue_identifier
      in: path
      required: true
      description: Human-readable issue identifier (e.g. PROJ-42) or UUID.
      schema:
        type: string

    ProjectID:
      name: project_id
      in: path
      required: true
      description: Project ID (SHA-256 hash of canonical root path).
      schema:
        type: string

    Provider:
      name: provider
      in: path
      required: true
      description: Agent provider name (claude/codex/gemini/opencode).
      schema:
        type: string
        enum: [claude, codex, gemini, opencode]

    UsageProvider:
      name: provider
      in: path
      required: true
      description: Usage provider (claude/codex).
      schema:
        type: string

    UsageScope:
      name: scope
      in: query
      description: Aggregation scope.
      schema:
        type: string
        enum: [all, project, session]
        default: all

    UsageRange:
      name: range
      in: query
      description: Time range for aggregation.
      schema:
        type: string
        enum: [7d, 30d, 90d, 1y]
        default: 30d

tags:
  - name: Health
    description: Daemon health checks and metadata.
  - name: State
    description: Orchestrator state snapshot and refresh control.
  - name: Issues
    description: Issue lifecycle management — create, read, update, delete, and control.
  - name: Events
    description: Real-time SSE event stream.
  - name: Sessions
    description: Agent execution session history.
  - name: Projects
    description: Project registration and management.
  - name: Git
    description: Git operations on registered projects.
  - name: GitHub
    description: GitHub API integration (issues, PRs, repos, OAuth).
  - name: TrackerConfigs
    description: External issue tracker connection management.
  - name: Workspace
    description: File system operations within registered project roots.
  - name: MCP
    description: Model Context Protocol server registry.
  - name: Agents
    description: Agent provider configuration (Claude, Codex, Gemini, OpenCode).
  - name: Usage
    description: Token usage analytics and rate limit monitoring.
  - name: STT
    description: Speech-to-text transcription via Whisper.
  - name: Terminal
    description: WebSocket PTY terminal multiplexer.
  - name: Unsandbox
    description: Remote execution service integration.
  - name: Runtimes
    description: Tailscale and Kubernetes runtime target configuration.
