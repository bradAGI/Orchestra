  /api/v1/stt/transcribe:
    post:
      tags: [STT]
      summary: Transcribe audio
      description: Submits audio for Whisper transcription and returns the text.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [audio]
              properties:
                audio:
                  type: string
                  format: byte
                  description: Base64-encoded audio data.
                language:
                  type: string
                  description: BCP-47 language code (optional).
      responses:
        '200':
          description: Transcription result.
          content:
            application/json:
              schema:
                type: object
                properties:
                  text:
                    type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  # ─── Terminal ─────────────────────────────────────────────────────────────
  /api/v1/terminal/{session_id}:
    get:
      tags: [Terminal]
      summary: Terminal WebSocket
      description: >
        Upgrades to a WebSocket connection that proxies a PTY session.
        The session is identified by `session_id`. No HTTP authentication
        is required on this endpoint (auth occurs at the WebSocket handshake level).

        **Protocol:** xterm-compatible binary frames. Resize via a JSON control frame:
        `{"type":"resize","cols":N,"rows":N}`.
      security: []
      parameters:
        - name: session_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '101':
          description: Switching Protocols — WebSocket connection established.
        '400':
          description: Bad request (non-WebSocket request).

