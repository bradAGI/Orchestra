openapi: 3.0.3
info:
  title: Orchestra API
  version: 1.0.0
  description: |
    Orchestra is a multi-agent orchestration platform that dispatches coding agents
    (Claude, Codex, OpenCode, Gemini) to resolve issues from project trackers.

    The daemon (`orchestrad`) binds to `127.0.0.1:3284` by default. All `/api/v1/*`
    routes require bearer token authentication when `ORCHESTRA_API_TOKEN` is set.
    Connections from loopback addresses bypass auth automatically.

    **Rate limiting:** 20 req/s sustained, 60 burst (per-IP token bucket). OAuth
    endpoints use a tighter limit of 5 req/s / 10 burst.

servers:
  - url: http://127.0.0.1:3284
    description: Default local daemon

security:
  - BearerAuth: []

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: >
        Pass `Authorization: Bearer <token>` where token matches
        `ORCHESTRA_API_TOKEN`. Omit on loopback connections.

  schemas:
    Error:
      type: object
      description: Standard error envelope returned by all API errors.
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              example: issue_not_found
            message:
              type: string
              example: issue not found
        details:
          type: object
          additionalProperties: true
          description: Optional extra context (e.g. partial state on refresh failure).

    Issue:
      type: object
      description: >
        An issue tracked by Orchestra. Issues move through states:
        Backlog → Todo → In Progress → Review → Done.
      properties:
        id:
          type: string
          description: Internal UUID.
        identifier:
          type: string
          description: Human-readable short identifier (e.g. PROJ-42).
        title:
          type: string
        description:
          type: string
        state:
          type: string
          enum: [Backlog, Todo, In Progress, Review, Done]
        priority:
          type: integer
          description: Numeric priority (lower = higher priority).
        assignee_id:
          type: string
          description: Provider name assigned to this issue (e.g. claude, codex).
        project_id:
          type: string
        branch_name:
          type: string
          description: Git branch created for this issue.
        base_sha:
          type: string
          description: Git SHA of the commit the branch was created from.
        url:
          type: string
          description: Upstream tracker URL.
        labels:
          type: array
          items:
            type: string
        blocked_by:
          type: array
          items:
            $ref: '#/components/schemas/Blocker'
        provider:
          type: string
          description: Agent provider override (claude/codex/gemini/opencode).
        runtime_target:
          type: string
          description: Remote execution target (tailscale/kubernetes node name).
        disabled_tools:
          type: array
          items:
            type: string
          description: Tool names disabled for this issue's agent run.
        feedback:
          type: string
          description: Human feedback used when returning issue from Review.
        pr_url:
          type: string
          description: GitHub pull request URL if one was created.
        plan:
          type: string
          description: Agent execution plan text.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        status:
          type: string
          description: Runtime dispatch status (IDLE, RUNNING, RETRYING, etc.).
        attempts:
          type: object
          properties:
            restart_count:
              type: integer
            current_retry_attempt:
              type: integer
        workspace:
          type: object
          properties:
            path:
              type: string
        running:
          type: object
          description: Present when the issue has an active agent session.
          properties:
            provider:
              type: string
            session_log_path:
              type: string
            last_event:
              type: string
            last_event_at:
              type: string
              format: date-time
            last_message:
              type: string
        retry:
          type: object
          description: Present when the issue is in retry backoff.
          properties:
            attempt:
              type: integer
            error:
              type: string
        logs:
          type: object
          properties:
            codex_session_logs:
              type: array
              items:
                type: object
                properties:
                  label:
                    type: string
                  path:
                    type: string
                  url:
                    type: string
                    nullable: true
        recent_events:
          type: array
          items:
            type: object
            properties:
              at:
                type: string
                format: date-time
              event:
                type: string
              message:
                type: string
        last_error:
          type: string
        history:
          type: array
          items:
            $ref: '#/components/schemas/HistoryEntry'

    Blocker:
      type: object
      properties:
        id:
          type: string
        identifier:
          type: string
        title:
          type: string

    HistoryEntry:
      type: object
      properties:
        source:
          type: string
          enum: [metadata, agent]
        id:
          type: string
        provider:
          type: string
        kind:
          type: string
        message:
          type: string
        input_tokens:
          type: integer
        output_tokens:
          type: integer
        timestamp:
          type: string
          format: date-time

    Project:
      type: object
      description: A registered codebase with optional GitHub integration.
      properties:
        id:
          type: string
          description: SHA-256 hash of the canonical root path (first 16 bytes, hex).
        name:
          type: string
          description: Derived from the directory basename.
        root_path:
          type: string
          description: Absolute path on the server filesystem.
        remote_url:
          type: string
          description: Git remote URL.
        github_owner:
          type: string
        github_repo:
          type: string
        github_token:
          type: string
          description: Redacted sentinel "<set>" if configured, "" otherwise.
        tracker_config_id:
          type: string
          description: Legacy global tracker config assignment.
        path_exists:
          type: boolean
          description: Whether the root_path exists on the server.
        issue_source_type:
          type: string
          description: Per-project issue source type (github/linear/jira/sqlite/memory).
        issue_source_endpoint:
          type: string
          description: Per-project issue source endpoint or repo slug.
        issue_source_has_token:
          type: boolean
          description: Whether a token is configured for the per-project issue source.

    ProjectStats:
      type: object
      properties:
        total_sessions:
          type: integer
        total_input:
          type: integer
        total_output:
          type: integer
        last_active:
          type: string
          format: date-time

    Session:
      type: object
      description: An agent execution session linked to a project and provider.
      properties:
        id:
          type: string
        project_id:
          type: string
        project_name:
          type: string
        session_uuid:
          type: string
        provider:
          type: string
        model:
          type: string
        branch:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        total_input:
          type: integer
        total_output:
          type: integer

    SessionDetail:
      allOf:
        - $ref: '#/components/schemas/Session'
        - type: object
          properties:
            events:
              type: array
              items:
                $ref: '#/components/schemas/Event'

    Event:
      type: object
      properties:
        id:
          type: string
        session_id:
          type: string
        kind:
          type: string
          description: Event kind (tool_use, tool_result, message, etc.).
        message:
          type: string
        raw_payload:
          type: string
        input_tokens:
          type: integer
        output_tokens:
          type: integer
        timestamp:
          type: string
          format: date-time

    TrackerConfig:
      type: object
      description: A named connection to an external issue tracker.
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
          description: Tracker backend type (github/linear/jira).
        display_name:
          type: string
        endpoint:
          type: string
          description: API base URL or repository slug (owner/repo for GitHub).
        auth_method:
          type: string
          enum: [apikey, oauth, none]
        has_token:
          type: boolean
          description: Whether an encrypted token is stored.
        extra:
          type: string
          description: JSON string with tracker-specific extra config.
        created_at:
          type: integer
          description: Unix timestamp.
        updated_at:
          type: integer
          description: Unix timestamp.

    WorkItem:
      type: object
      description: A work item returned directly from a tracker adapter.
      properties:
        id:
          type: string
        identifier:
          type: string
        source:
          type: string
          enum: [github, linear, jira, sqlite, memory]
        title:
          type: string
        description:
          type: string
        priority:
          type: integer
        state:
          type: string
        branch_name:
          type: string
        url:
          type: string
        project_id:
          type: string
        assignee_id:
          type: string
        assignees:
          type: array
          items:
            type: string
        assigned_to_worker:
          type: boolean
        labels:
          type: array
          items:
            type: string
        blocked_by:
          type: array
          items:
            $ref: '#/components/schemas/Blocker'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        provider:
          type: string
        runtime_target:
          type: string
        disabled_tools:
          type: array
          items:
            type: string
        base_sha:
          type: string
        feedback:
          type: string
        pr_url:
          type: string
        plan:
          type: string
        extra:
          type: object
          additionalProperties: true

    TrackerProject:
      type: object
      properties:
        id:
          type: string
        name:
          type: string

    TrackerState:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        type:
          type: string
          enum: [todo, in_progress, done, cancelled]

    MCPServer:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        command:
          type: string
          description: Shell command used to start the server (stdin/stdout JSON-RPC).

    GlobalStats:
      type: object
      properties:
        total_tokens:
          type: integer
        total_input:
          type: integer
        total_output:
          type: integer
        total_cache_read:
          type: integer
        total_cache_write:
          type: integer
        total_thinking:
          type: integer
        provider_usage:
          type: object
          additionalProperties:
            type: integer
        provider_tokens:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/ProviderTokens'
        model_usage:
          type: object
          additionalProperties:
            type: integer
        provider_sessions:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/ProviderSessionStats'
        recent_sessions:
          type: array
          items:
            $ref: '#/components/schemas/Session'

    ProviderTokens:
      type: object
      properties:
        total:
          type: integer
        input:
          type: integer
        output:
          type: integer
        cache_read:
          type: integer
        cache_write:
          type: integer
        thinking:
          type: integer

    ProviderSessionStats:
      type: object
      properties:
        total:
          type: integer
        completed:
          type: integer
        failed:
          type: integer
        avg_duration:
          type: number
          format: double

    FileNode:
      type: object
      properties:
        name:
          type: string
        path:
          type: string
          description: Path relative to the tree root.
        is_dir:
          type: boolean
        children:
          type: array
          items:
            $ref: '#/components/schemas/FileNode'

    AgentConfig:
      type: object
      properties:
        commands:
          type: object
          additionalProperties:
            type: string
          description: Map of provider name → executable command.
        agent_provider:
          type: string
          description: Default provider name.
        max_turns:
          type: integer
          description: Maximum agent turns per issue (1–100).

    GitCommit:
      type: object
      properties:
        hash:
          type: string
        author:
          type: string
        date:
          type: string
        message:
          type: string

    GitStatusFile:
      type: object
      properties:
        status:
          type: string
          description: Two-character porcelain status code (e.g. " M", "A ").
        path:
          type: string

    GitBranchDetail:
      type: object
      properties:
        name:
          type: string
        current:
          type: boolean
        remote:
          type: string
        ahead:
          type: integer
        behind:
          type: integer
        last_commit:
          type: string
        last_commit_date:
          type: string

    PRRequest:
      type: object
      required: [title, head, base]
      properties:
        title:
          type: string
        body:
          type: string
        head:
          type: string
          description: Source branch name.
        base:
          type: string
          description: Target branch name.
        owner:
          type: string
          description: GitHub owner (inferred from project if omitted).
        repo:
          type: string
          description: GitHub repo (inferred from project if omitted).
        token:
          type: string
          description: GitHub PAT (inferred from project/config/gh CLI if omitted).

    UsageScanState:
      type: object
      description: State of the usage file scanner for a provider.
      properties:
        enabled:
          type: boolean
        scanning:
          type: boolean
        last_scan:
          type: string
          format: date-time
        error:
          type: string
          nullable: true
        file_count:
          type: integer
        session_count:
          type: integer

    UsageSummary:
      type: object
      description: Aggregated token usage summary for a provider over a range.
      properties:
        total_input:
          type: integer
        total_output:
          type: integer
        total_cache_read:
          type: integer
        total_cache_write:
          type: integer
        total_cost_usd:
          type: number
          format: double
        session_count:
          type: integer

    UsageDailyPoint:
      type: object
      properties:
        date:
          type: string
          format: date
        input_tokens:
          type: integer
        output_tokens:
          type: integer
        cost_usd:
          type: number
          format: double

    UsageBreakdownRow:
      type: object
      properties:
        key:
          type: string
          description: Model name, project name, or session ID depending on kind.
        input_tokens:
          type: integer
        output_tokens:
          type: integer
        cost_usd:
          type: number
          format: double
        session_count:
          type: integer

    UsageSession:
      type: object
      properties:
        session_id:
          type: string
        project:
          type: string
        model:
          type: string
        started_at:
          type: string
          format: date-time
        duration_seconds:
          type: number
        input_tokens:
          type: integer
        output_tokens:
          type: integer
        cost_usd:
          type: number
          format: double

    RateLimitState:
      type: object
      description: Current Claude API rate limit status.
      properties:
        requests_limit:
          type: integer
        requests_remaining:
          type: integer
        requests_reset:
          type: string
          format: date-time
        tokens_limit:
          type: integer
        tokens_remaining:
          type: integer
        tokens_reset:
          type: string
          format: date-time

paths:
  # ─── Health ───────────────────────────────────────────────────────────────
  /healthz:
    get:
      tags: [Health]
      summary: Health check (root)
      description: Returns 200 OK with `{"status":"ok"}`. No authentication required.
      security: []
      responses:
        '200':
          description: Daemon is running.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  /api/v1/healthz:
    get:
      tags: [Health]
      summary: Health check (versioned)
      description: Identical to GET /healthz. No authentication required.
      security: []
      responses:
        '200':
          description: Daemon is running.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  /api/v1/openapi.yaml:
    get:
      tags: [Health]
      summary: OpenAPI spec
      description: Returns this OpenAPI specification as YAML. No authentication required.
      security: []
      responses:
        '200':
          description: OpenAPI YAML document.
          content:
            text/yaml:
              schema:
                type: string

  # ─── State ────────────────────────────────────────────────────────────────
  /api/v1/state:
    get:
      tags: [State]
      summary: Orchestrator snapshot
      description: Returns the full in-memory orchestrator state, including all running, queued, and retry issues. Used by the desktop for initial hydration.
      responses:
        '200':
          description: Current orchestrator snapshot.
          content:
            application/json:
              schema:
                type: object
                description: Presenter-formatted state payload.
                additionalProperties: true
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/refresh:
    post:
      tags: [State]
      summary: Queue orchestrator refresh
      description: Enqueues a tracker sync cycle and returns immediately with 202 Accepted.
      responses:
        '202':
          description: Refresh queued.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ─── Issues ───────────────────────────────────────────────────────────────
  /api/v1/issues:
    get:
      tags: [Issues]
      summary: List issues
      description: >
        Returns all issues with optional filtering. Supports pagination via
        `limit`/`offset`. `states` is a comma-separated list.
      parameters:
        - name: states
          in: query
          description: Comma-separated list of states to filter by.
          schema:
            type: string
            example: "Todo,In Progress"
        - name: project_id
          in: query
          schema:
            type: string
        - name: assignee_id
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
      responses:
        '200':
          description: List of issues with total count.
          content:
            application/json:
              schema:
                type: object
                properties:
                  issues:
                    type: array
                    items:
                      $ref: '#/components/schemas/Issue'
                  total:
                    type: integer
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

    post:
      tags: [Issues]
      summary: Create issue
      description: Creates a new issue in the configured tracker.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title]
              properties:
                title:
                  type: string
                description:
                  type: string
                state:
                  type: string
                  default: Backlog
                priority:
                  type: integer
                assignee_id:
                  type: string
                project_id:
                  type: string
                provider:
                  type: string
                  description: Agent provider override.
                runtime_target:
                  type: string
                disabled_tools:
                  type: array
                  items:
                    type: string
      responses:
        '201':
          description: Issue created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Issue'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/issues/{issue_identifier}:
    get:
      tags: [Issues]
      summary: Get issue
      description: >
        Returns full issue detail including runtime state, workspace path,
        history, and recent events. Falls back to tracker data when the issue
        is not actively running.
      parameters:
        - $ref: '#/components/parameters/IssueIdentifier'
      responses:
        '200':
          description: Issue detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Issue'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      tags: [Issues]
      summary: Update issue
      description: >
        Applies partial updates to an issue. State changes are validated against
        the allowed transition graph. Certain fields are locked when the issue is
        not in Backlog (title, description, project_id, assignee_id).
        Moving to Review or Done auto-commits the worktree. Moving to Done
        also removes the worktree.
      parameters:
        - $ref: '#/components/parameters/IssueIdentifier'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                description:
                  type: string
                state:
                  type: string
                  enum: [Backlog, Todo, In Progress, Review, Done]
                priority:
                  type: integer
                assignee_id:
                  type: string
                project_id:
                  type: string
                feedback:
                  type: string
                  description: Required when moving from Review back to Todo/In Progress.
                branch_name:
                  type: string
                base_sha:
                  type: string
                plan:
                  type: string
                pr_url:
                  type: string
      responses:
        '200':
          description: Updated issue.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Issue'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

    delete:
      tags: [Issues]
      summary: Delete issue
      description: Permanently deletes the issue, stops any running sessions, and removes the git worktree/branch.
      parameters:
        - $ref: '#/components/parameters/IssueIdentifier'
      responses:
        '204':
          description: Issue deleted.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/issues/{issue_identifier}/history:
    get:
      tags: [Issues]
      summary: Issue history
      description: Returns the run/event history for an issue.
      parameters:
        - $ref: '#/components/parameters/IssueIdentifier'
      responses:
        '200':
          description: History entries.
          content:
            application/json:
              schema:
                type: object
                properties:
                  history:
                    type: array
                    items:
                      $ref: '#/components/schemas/HistoryEntry'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/issues/{issue_identifier}/logs:
    get:
      tags: [Issues]
      summary: Issue session logs
      description: Returns the most recent agent session log as plain text.
      parameters:
        - $ref: '#/components/parameters/IssueIdentifier'
      responses:
        '200':
          description: Plain-text log content. Returns empty body when no logs exist yet.
          content:
            text/plain:
              schema:
                type: string
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/issues/{issue_identifier}/diff:
    get:
      tags: [Issues]
      summary: Issue git diff
      description: >
        Returns the unified git diff for all changes made by the agent.
        Uses `base_sha..branch_name` when available; falls back to
        legacy workspace diff.
      parameters:
        - $ref: '#/components/parameters/IssueIdentifier'
        - name: provider
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Unified diff text.
          content:
            text/plain:
              schema:
                type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/issues/{issue_identifier}/artifacts:
    get:
      tags: [Issues]
      summary: List artifacts
      description: Lists artifacts (files) produced during the issue's agent runs.
      parameters:
        - $ref: '#/components/parameters/IssueIdentifier'
        - name: provider
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Artifact list.
          content:
            application/json:
              schema:
                type: object
                properties:
                  artifacts:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/issues/{issue_identifier}/artifacts/{path}:
    get:
      tags: [Issues]
      summary: Get artifact content
      description: Returns the raw binary content of a specific artifact file.
      parameters:
        - $ref: '#/components/parameters/IssueIdentifier'
        - name: path
          in: path
          required: true
          schema:
            type: string
        - name: provider
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Raw artifact bytes.
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/issues/{issue_identifier}/session:
    delete:
      tags: [Issues]
      summary: Stop issue session
      description: Stops the active agent session for an issue and resets state to Todo.
      parameters:
        - $ref: '#/components/parameters/IssueIdentifier'
        - name: provider
          in: query
          description: Stop only this provider's session. Omit to stop all.
          schema:
            type: string
      responses:
        '204':
          description: Session stopped.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: No active session for the specified provider.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/issues/{issue_identifier}/stop:
    post:
      tags: [Issues]
      summary: Stop and reset issue
      description: >
        Stops all agent sessions, removes the worktree/branch, and resets the
        issue to Backlog, clearing feedback, plan, branch_name, and base_sha.
      parameters:
        - $ref: '#/components/parameters/IssueIdentifier'
      responses:
        '200':
          description: Reset issue.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Issue'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/issues/{issue_identifier}/pr:
    post:
      tags: [Issues]
      summary: Create GitHub pull request
      description: >
        Pushes the issue branch and creates a GitHub pull request. Owner, repo,
        and token are inferred from the project, global config, or `gh` CLI if
        not supplied. Stores the resulting PR URL on the issue.
      parameters:
        - $ref: '#/components/parameters/IssueIdentifier'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PRRequest'
      responses:
        '201':
          description: Pull request created or found.
          content:
            application/json:
              schema:
                type: object
                description: GitHub PR object.
                additionalProperties: true
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/search:
    get:
      tags: [Issues]
      summary: Search issues
      description: Full-text search across all issues using the `q` parameter.
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Matching issues.
          content:
            application/json:
              schema:
                type: object
                properties:
                  issues:
                    type: array
                    items:
                      $ref: '#/components/schemas/Issue'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ─── Events (SSE) ─────────────────────────────────────────────────────────
  /api/v1/events:
    get:
      tags: [Events]
      summary: Subscribe to SSE event stream
      description: >
        Long-lived Server-Sent Events stream. Each event carries a JSON payload
        describing orchestrator state changes, agent execution events, and
        telemetry updates.

        **Event types:** `state_update`, `issue_update`, `agent_event`,
        `session_started`, `session_ended`, `run_completed`, `run_failed`.

        Clients should reconnect on disconnect using the `Last-Event-ID` header.
      responses:
        '200':
          description: SSE stream (keep-alive with periodic heartbeat comments).
          content:
            text/event-stream:
              schema:
                type: string
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ─── Sessions ─────────────────────────────────────────────────────────────
  /api/v1/sessions:
    get:
      tags: [Sessions]
      summary: List sessions
      description: Returns all agent sessions with aggregated token usage.
      parameters:
        - name: project_id
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
        - name: offset
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: Sessions with total count.
          content:
            application/json:
              schema:
                type: object
                properties:
                  sessions:
                    type: array
                    items:
                      $ref: '#/components/schemas/Session'
                  total:
                    type: integer
        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'

  /api/v1/sessions/{session_id}:
    get:
      tags: [Sessions]
      summary: Get session detail
      description: Returns a session and all its ordered events.
      parameters:
        - name: session_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Session with events.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionDetail'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # ─── Projects ─────────────────────────────────────────────────────────────
  /api/v1/projects:
    get:
      tags: [Projects]
      summary: List projects
      description: Returns all registered projects. Token fields are redacted.
      responses:
        '200':
          description: Project list.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Project'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'

    post:
      tags: [Projects]
      summary: Register project
      description: >
        Registers a local directory as a project. Git remote info is detected
        automatically. GitHub owner/repo are parsed from the remote URL.
        Pass `issue_source_*` fields to configure the issue source at creation time.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [root_path]
              properties:
                root_path:
                  type: string
                  description: Absolute path to the project directory.
                issue_source_type:
                  type: string
                issue_source_endpoint:
                  type: string
                issue_source_token:
                  type: string
      responses:
        '201':
          description: Project registered.
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/projects/{project_id}:
    get:
      tags: [Projects]
      summary: Get project stats
      description: Returns aggregate session count and token usage for a project.
      parameters:
        - $ref: '#/components/parameters/ProjectID'
      responses:
        '200':
          description: Project stats.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectStats'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

    delete:
      tags: [Projects]
      summary: Delete project
      description: Removes a project and all associated sessions, events, runs, and issues.
      parameters:
        - $ref: '#/components/parameters/ProjectID'
      responses:
        '204':
          description: Project deleted.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/projects/{project_id}/refresh:
    post:
      tags: [Projects]
      summary: Refresh project git info
      description: Re-scans the project's git remote URL and updates GitHub owner/repo.
      parameters:
        - $ref: '#/components/parameters/ProjectID'
      responses:
        '200':
          description: Refresh complete.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/projects/{project_id}/issue-source:
    patch:
      tags: [Projects]
      summary: Update issue source
      description: Sets or updates the per-project issue source configuration.
      parameters:
        - $ref: '#/components/parameters/ProjectID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                issue_source_type:
                  type: string
                issue_source_endpoint:
                  type: string
                issue_source_token:
                  type: string
      responses:
        '200':
          description: Updated project.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/projects/{project_id}/issue-source/test:
    post:
      tags: [Projects]
      summary: Test issue source connection
      description: Pings the configured issue source and returns ok/error.
      parameters:
        - $ref: '#/components/parameters/ProjectID'
      responses:
        '200':
          description: Connection test result.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  error:
                    type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/projects/{project_id}/tracker/issues:
    get:
      tags: [Projects]
      summary: Browse tracker issues
      description: Live browse of the project's issue source (used by TrackerViewer panel).
      parameters:
        - $ref: '#/components/parameters/ProjectID'
        - name: states
          in: query
          schema:
            type: string
            description: Comma-separated state filter.
      responses:
        '200':
          description: Work items from the tracker.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WorkItem'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/projects/{project_id}/file:
    get:
      tags: [Projects]
      summary: Get project file content
      description: Returns the content of a file within the project.
      parameters:
        - $ref: '#/components/parameters/ProjectID'
        - name: path
          in: query
          required: true
          description: Path relative to project root.
          schema:
            type: string
      responses:
        '200':
          description: File content as plain text.
          content:
            text/plain:
              schema:
                type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/projects/{project_id}/tree:
    get:
      tags: [Projects]
      summary: Get project file tree
      description: Returns a shallow directory listing (1 level deep) for the project root or a subdirectory.
      parameters:
        - $ref: '#/components/parameters/ProjectID'
        - name: path
          in: query
          description: Relative path within the project to list. Defaults to root.
          schema:
            type: string
      responses:
        '200':
          description: File tree nodes.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FileNode'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # ─── Git operations ────────────────────────────────────────────────────────
  /api/v1/projects/{project_id}/git:
    get:
      tags: [Git]
      summary: Git commit history
      description: Returns the last 20 commits for the project (or a specific branch).
      parameters:
        - $ref: '#/components/parameters/ProjectID'
        - name: branch
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Commit list.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GitCommit'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/projects/{project_id}/git/status:
    get:
      tags: [Git]
      summary: Git working tree status
      description: Returns porcelain file status and branch ahead/behind counts.
      parameters:
        - $ref: '#/components/parameters/ProjectID'
      responses:
        '200':
          description: Git status.
          content:
            application/json:
              schema:
                type: object
                properties:
                  files:
                    type: array
                    items:
                      $ref: '#/components/schemas/GitStatusFile'
                  branch:
                    type: object
                    properties:
                      ahead:
                        type: integer
                      behind:
                        type: integer
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/projects/{project_id}/git/diff:
    get:
      tags: [Git]
      summary: Git diff
      description: >
        Returns a git diff. Pass `hash` for a specific commit, `file` to scope
        to a path, `staged=true` for the index diff.
      parameters:
        - $ref: '#/components/parameters/ProjectID'
        - name: hash
          in: query
          schema:
            type: string
        - name: file
          in: query
          schema:
            type: string
        - name: staged
          in: query
          schema:
            type: string
            enum: [true, false]
      responses:
        '200':
          description: Unified diff text.
          content:
            text/plain:
              schema:
                type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/projects/{project_id}/git/commit:
    post:
      tags: [Git]
      summary: Git commit
      description: Creates a commit in the project directory with the given message.
      parameters:
        - $ref: '#/components/parameters/ProjectID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message]
              properties:
                message:
                  type: string
      responses:
        '200':
          description: Commit successful.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/projects/{project_id}/git/push:
    post:
      tags: [Git]
      summary: Git push
      description: Pushes the current or specified branch to remote.
      parameters:
        - $ref: '#/components/parameters/ProjectID'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                remote:
                  type: string
                  default: origin
                branch:
                  type: string
                  description: Defaults to current branch.
      responses:
        '200':
          description: Push successful.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/projects/{project_id}/git/pull:
    post:
      tags: [Git]
      summary: Git pull
      description: Pulls from remote.
      parameters:
        - $ref: '#/components/parameters/ProjectID'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                remote:
                  type: string
                  default: origin
                branch:
                  type: string
      responses:
        '200':
          description: Pull successful.
          content:
            application/json:
              schema:
                type: object
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/projects/{project_id}/git/fetch:
    post:
      tags: [Git]
      summary: Git fetch
      description: Fetches all remotes.
      parameters:
        - $ref: '#/components/parameters/ProjectID'
      responses:
        '200':
          description: Fetch successful.
          content:
            application/json:
              schema:
                type: object
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/projects/{project_id}/git/branches:
    get:
      tags: [Git]
      summary: List branches
      description: Returns local and remote branch names with the current branch.
      parameters:
        - $ref: '#/components/parameters/ProjectID'
      responses:
        '200':
          description: Branch lists.
          content:
            application/json:
              schema:
                type: object
                properties:
                  current:
                    type: string
                  branches:
                    type: array
                    items:
                      type: string
                  remote_branches:
                    type: array
                    items:
                      type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    post:
      tags: [Git]
      summary: Create branch
      description: Creates a new branch from the current HEAD.
      parameters:
        - $ref: '#/components/parameters/ProjectID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
      responses:
        '200':
          description: Branch created.
          content:
            application/json:
              schema:
                type: object
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/projects/{project_id}/git/branches/detail:
    get:
      tags: [Git]
      summary: List branches with detail
      description: Returns branches with ahead/behind counts and last commit info.
      parameters:
        - $ref: '#/components/parameters/ProjectID'
      responses:
        '200':
          description: Detailed branch list.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GitBranchDetail'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/projects/{project_id}/git/branches/{branch}:
    delete:
      tags: [Git]
      summary: Delete branch
      description: Deletes a local branch.
      parameters:
        - $ref: '#/components/parameters/ProjectID'
        - name: branch
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Branch deleted.
          content:
            application/json:
              schema:
                type: object
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/projects/{project_id}/git/checkout:
    post:
      tags: [Git]
      summary: Checkout branch
      description: Checks out an existing branch.
      parameters:
        - $ref: '#/components/parameters/ProjectID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [branch]
              properties:
                branch:
                  type: string
      responses:
        '200':
          description: Checkout successful.
          content:
            application/json:
              schema:
                type: object
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/projects/{project_id}/git/stage:
    post:
      tags: [Git]
      summary: Stage files
      description: Stages files for commit (`git add`).
      parameters:
        - $ref: '#/components/parameters/ProjectID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                files:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: Files staged.
          content:
            application/json:
              schema:
                type: object
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/projects/{project_id}/git/unstage:
    post:
      tags: [Git]
      summary: Unstage files
      description: Unstages files from the index (`git reset HEAD`).
      parameters:
        - $ref: '#/components/parameters/ProjectID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                files:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: Files unstaged.
          content:
            application/json:
              schema:
                type: object
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/projects/{project_id}/git/stash:
    post:
      tags: [Git]
      summary: Git stash
      description: Stashes working tree changes.
      parameters:
        - $ref: '#/components/parameters/ProjectID'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
      responses:
        '200':
          description: Stash created.
          content:
            application/json:
              schema:
                type: object
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/projects/{project_id}/git/stash/list:
    get:
      tags: [Git]
      summary: List stashes
      description: Returns the stash list.
      parameters:
        - $ref: '#/components/parameters/ProjectID'
      responses:
        '200':
          description: Stash entries.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/projects/{project_id}/git/stash/pop:
    post:
      tags: [Git]
      summary: Pop stash
      description: Applies and removes the top stash entry.
      parameters:
        - $ref: '#/components/parameters/ProjectID'
      responses:
        '200':
          description: Stash applied.
          content:
            application/json:
              schema:
                type: object
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/projects/{project_id}/git/stash/apply:
    post:
      tags: [Git]
      summary: Apply stash
      description: Applies a stash entry without removing it.
      parameters:
        - $ref: '#/components/parameters/ProjectID'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                index:
                  type: integer
      responses:
        '200':
          description: Stash applied.
          content:
            application/json:
              schema:
                type: object
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/projects/{project_id}/git/stash/drop:
    post:
      tags: [Git]
      summary: Drop stash
      description: Removes a stash entry.
      parameters:
        - $ref: '#/components/parameters/ProjectID'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                index:
                  type: integer
      responses:
        '200':
          description: Stash dropped.
          content:
            application/json:
              schema:
                type: object
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/projects/{project_id}/git/conflicts:
    get:
      tags: [Git]
      summary: List merge conflicts
      description: Returns files with merge conflicts.
      parameters:
        - $ref: '#/components/parameters/ProjectID'
      responses:
        '200':
          description: Conflict file list.
          content:
            application/json:
              schema:
                type: object
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/projects/{project_id}/git/merge:
    post:
      tags: [Git]
      summary: Merge branch
      description: Merges a branch into the current branch.
      parameters:
        - $ref: '#/components/parameters/ProjectID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [branch]
              properties:
                branch:
                  type: string
      responses:
        '200':
          description: Merge result.
          content:
            application/json:
              schema:
                type: object
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/projects/{project_id}/git/merge/abort:
    post:
      tags: [Git]
      summary: Abort merge
      description: Aborts an in-progress merge.
      parameters:
        - $ref: '#/components/parameters/ProjectID'
      responses:
        '200':
          description: Merge aborted.
          content:
            application/json:
              schema:
                type: object
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/projects/{project_id}/git/resolve:
    post:
      tags: [Git]
      summary: Resolve conflict
      description: Marks a conflicted file as resolved.
      parameters:
        - $ref: '#/components/parameters/ProjectID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [path]
              properties:
                path:
                  type: string
      responses:
        '200':
          description: Conflict resolved.
          content:
            application/json:
              schema:
                type: object
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/projects/{project_id}/git/default-branch:
    get:
      tags: [Git]
      summary: Get default branch
      description: Returns the default branch name (main or master).
      parameters:
        - $ref: '#/components/parameters/ProjectID'
      responses:
        '200':
          description: Default branch name.
          content:
            application/json:
              schema:
                type: object
                properties:
                  branch:
                    type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # ─── GitHub integration ────────────────────────────────────────────────────
  /api/v1/projects/{project_id}/github/issues:
    get:
      tags: [GitHub]
      summary: List GitHub issues
      description: Returns GitHub issues for the project's linked repository.
      parameters:
        - $ref: '#/components/parameters/ProjectID'
        - name: state
          in: query
          schema:
            type: string
            enum: [open, closed]
            default: open
        - name: page
          in: query
          schema:
            type: integer
            default: 1
      responses:
        '200':
          description: GitHub issues with has_more flag.
          content:
            application/json:
              schema:
                type: object
                properties:
                  issues:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
                  has_more:
                    type: boolean
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '502':
          $ref: '#/components/responses/BadGateway'

    post:
      tags: [GitHub]
      summary: Create GitHub issue
      description: Creates a new issue in the project's GitHub repository.
      parameters:
        - $ref: '#/components/parameters/ProjectID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title]
              properties:
                title:
                  type: string
                body:
                  type: string
                labels:
                  type: array
                  items:
                    type: string
      responses:
        '201':
          description: GitHub issue created.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '401':
          $ref: '#/components/responses/Unauthorized'
        '502':
          $ref: '#/components/responses/BadGateway'

  /api/v1/projects/{project_id}/github/issues/{number}:
    patch:
      tags: [GitHub]
      summary: Update GitHub issue
      description: Updates a GitHub issue's title, body, state, or labels.
      parameters:
        - $ref: '#/components/parameters/ProjectID'
        - name: number
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Updated GitHub issue.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '401':
          $ref: '#/components/responses/Unauthorized'
        '502':
          $ref: '#/components/responses/BadGateway'

  /api/v1/projects/{project_id}/github/pulls:
    get:
      tags: [GitHub]
      summary: List pull requests
      description: Returns open pull requests for the project's GitHub repository.
      parameters:
        - $ref: '#/components/parameters/ProjectID'
      responses:
        '200':
          description: Pull request list.
          content:
            application/json:
              schema:
                type: object
                properties:
                  pulls:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
        '401':
          $ref: '#/components/responses/Unauthorized'
        '502':
          $ref: '#/components/responses/BadGateway'

    post:
      tags: [GitHub]
      summary: Create pull request (project)
      description: Creates a GitHub pull request for the project.
      parameters:
        - $ref: '#/components/parameters/ProjectID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PRRequest'
      responses:
        '201':
          description: Pull request created.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '401':
          $ref: '#/components/responses/Unauthorized'
        '502':
          $ref: '#/components/responses/BadGateway'

  /api/v1/projects/{project_id}/github/pulls/{number}/diff:
    get:
      tags: [GitHub]
      summary: Pull request diff
      description: Returns the unified diff for a pull request.
      parameters:
        - $ref: '#/components/parameters/ProjectID'
        - name: number
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Unified diff text.
          content:
            text/plain:
              schema:
                type: string
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/projects/{project_id}/github/pulls/{number}/reviews:
    get:
      tags: [GitHub]
      summary: List PR reviews
      parameters:
        - $ref: '#/components/parameters/ProjectID'
        - name: number
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Review list.
          content:
            application/json:
              schema:
                type: object
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      tags: [GitHub]
      summary: Submit PR review
      parameters:
        - $ref: '#/components/parameters/ProjectID'
        - name: number
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                body:
                  type: string
                event:
                  type: string
                  enum: [COMMENT, APPROVE, REQUEST_CHANGES]
      responses:
        '201':
          description: Review submitted.
          content:
            application/json:
              schema:
                type: object
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/projects/{project_id}/github/pulls/{number}/comments:
    get:
      tags: [GitHub]
      summary: List PR comments
      parameters:
        - $ref: '#/components/parameters/ProjectID'
        - name: number
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Comment list.
          content:
            application/json:
              schema:
                type: object
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/projects/{project_id}/github/pulls/{number}/merge:
    put:
      tags: [GitHub]
      summary: Merge pull request
      parameters:
        - $ref: '#/components/parameters/ProjectID'
        - name: number
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                merge_method:
                  type: string
                  enum: [merge, squash, rebase]
                  default: merge
      responses:
        '200':
          description: Merge result.
          content:
            application/json:
              schema:
                type: object
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/projects/{project_id}/github/disconnect:
    post:
      tags: [GitHub]
      summary: Disconnect GitHub
      description: Removes GitHub integration (owner, repo, token) from the project.
      parameters:
        - $ref: '#/components/parameters/ProjectID'
      responses:
        '200':
          description: Disconnected.
          content:
            application/json:
              schema:
                type: object
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/projects/{project_id}/github/create-repo:
    post:
      tags: [GitHub]
      summary: Create GitHub repository
      description: Creates a new GitHub repository and links it to the project.
      parameters:
        - $ref: '#/components/parameters/ProjectID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                private:
                  type: boolean
                  default: false
      responses:
        '201':
          description: Repository created and linked.
          content:
            application/json:
              schema:
                type: object
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ─── GitHub OAuth ──────────────────────────────────────────────────────────
  /api/v1/github/login:
    get:
      tags: [GitHub]
      summary: GitHub OAuth login
      description: Redirects to GitHub OAuth. Rate-limited to 5 req/s.
      security: []
      responses:
        '302':
          description: Redirect to GitHub.

  /api/v1/github/callback:
    get:
      tags: [GitHub]
      summary: GitHub OAuth callback
      description: Handles the OAuth callback from GitHub. Rate-limited to 5 req/s.
      security: []
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
        - name: state
          in: query
          schema:
            type: string
      responses:
        '302':
          description: Redirect to desktop after token exchange.

  # ─── Tracker configs ──────────────────────────────────────────────────────
  /api/v1/tracker/configs:
    get:
      tags: [TrackerConfigs]
      summary: List tracker configs
      description: Returns all stored tracker connection configurations.
      responses:
        '200':
          description: Config list.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TrackerConfig'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      tags: [TrackerConfigs]
      summary: Create tracker config
      description: Creates a new tracker connection. Token is encrypted before storage.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type, display_name]
              properties:
                type:
                  type: string
                  description: Tracker type (github/linear/jira).
                display_name:
                  type: string
                endpoint:
                  type: string
                auth_method:
                  type: string
                  default: apikey
                token:
                  type: string
                extra:
                  type: object
                  additionalProperties: true
      responses:
        '201':
          description: Tracker config created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrackerConfig'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/tracker/configs/{config_id}:
    patch:
      tags: [TrackerConfigs]
      summary: Update tracker config
      description: Partial update of a tracker config. Omit fields to leave them unchanged.
      parameters:
        - name: config_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                display_name:
                  type: string
                endpoint:
                  type: string
                auth_method:
                  type: string
                token:
                  type: string
                extra:
                  type: object
                  additionalProperties: true
      responses:
        '200':
          description: Updated config.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrackerConfig'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [TrackerConfigs]
      summary: Delete tracker config
      parameters:
        - name: config_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Deleted flag.
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted:
                    type: boolean
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/tracker/configs/{config_id}/test:
    post:
      tags: [TrackerConfigs]
      summary: Test tracker connection
      description: Pings the tracker and returns ok/error.
      parameters:
        - name: config_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Test result.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  error:
                    type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/tracker/configs/{config_id}/projects:
    get:
      tags: [TrackerConfigs]
      summary: List tracker projects
      description: Returns projects/teams available in the connected tracker.
      parameters:
        - name: config_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Tracker project list.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TrackerProject'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/tracker/configs/{config_id}/states:
    get:
      tags: [TrackerConfigs]
      summary: List tracker states
      description: Returns workflow states available in the connected tracker.
      parameters:
        - name: config_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: State list.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TrackerState'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/tracker/configs/{config_id}/issues:
    get:
      tags: [TrackerConfigs]
      summary: Browse tracker issues
      description: Returns work items from the tracker adapter with optional state filtering.
      parameters:
        - name: config_id
          in: path
          required: true
          schema:
            type: string
        - name: states
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Work items.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WorkItem'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/projects/{project_id}/tracker:
    post:
      tags: [TrackerConfigs]
      summary: Assign tracker config to project
      description: Links a global tracker config to a project. Pass `config_id=""` to clear.
      parameters:
        - $ref: '#/components/parameters/ProjectID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [config_id]
              properties:
                config_id:
                  type: string
      responses:
        '200':
          description: Assignment updated.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # ─── Workspace ────────────────────────────────────────────────────────────
  /api/v1/workspace/file:
    get:
      tags: [Workspace]
      summary: Read workspace file
      description: Returns the content of a file inside a registered project or workspace root.
      parameters:
        - name: path
          in: query
          required: true
          description: Absolute path (must be inside a registered root).
          schema:
            type: string
      responses:
        '200':
          description: File content as plain text.
          content:
            text/plain:
              schema:
                type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags: [Workspace]
      summary: Write workspace file
      description: >
        Writes content to a file inside a registered root. Maximum 32 MiB.
        The raw body is used as file content (not JSON-wrapped).
      parameters:
        - name: path
          in: query
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          text/plain:
            schema:
              type: string
      responses:
        '200':
          description: Write successful.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  bytes:
                    type: integer
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '413':
          description: Body exceeds 32 MiB limit.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/workspace/tree:
    get:
      tags: [Workspace]
      summary: List workspace directory
      description: Returns a flat directory listing for a path inside a registered root.
      parameters:
        - name: path
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Directory entries.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FileNode'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/workspace/dir:
    post:
      tags: [Workspace]
      summary: Create directory
      description: Creates a directory (and parents) inside a registered root.
      parameters:
        - name: path
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Directory created.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: Path already exists.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/workspace/rename:
    post:
      tags: [Workspace]
      summary: Rename/move path
      description: Moves a file or directory inside registered roots.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [from, to]
              properties:
                from:
                  type: string
                  description: Absolute source path.
                to:
                  type: string
                  description: Absolute destination path.
      responses:
        '200':
          description: Rename successful.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Destination already exists.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/workspace/path:
    delete:
      tags: [Workspace]
      summary: Delete workspace path
      description: Removes a file or directory inside a registered root.
      parameters:
        - name: path
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Deletion successful.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/workspace/migration/plan:
    get:
      tags: [Workspace]
      summary: Migration plan
      description: Returns the workspace migration plan for upgrading schema structures.
      responses:
        '200':
          description: Migration plan.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/workspace/migrate:
    post:
      tags: [Workspace]
      summary: Run migration
      description: Executes the workspace migration.
      responses:
        '200':
          description: Migration result.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ─── MCP servers ──────────────────────────────────────────────────────────
  /api/v1/mcp/tools:
    get:
      tags: [MCP]
      summary: List MCP tools
      description: Returns all tools advertised by running MCP servers.
      responses:
        '200':
          description: Tool list.
          content:
            application/json:
              schema:
                type: object
                properties:
                  tools:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/mcp/servers:
    get:
      tags: [MCP]
      summary: List MCP servers
      description: Returns all registered MCP server entries.
      responses:
        '200':
          description: Server list.
          content:
            application/json:
              schema:
                type: object
                properties:
                  servers:
                    type: array
                    items:
                      $ref: '#/components/schemas/MCPServer'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      tags: [MCP]
      summary: Register MCP server
      description: Adds a new MCP server and hot-reloads the registry.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, command]
              properties:
                name:
                  type: string
                command:
                  type: string
      responses:
        '201':
          description: Server registered.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MCPServer'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/mcp/servers/{id}:
    delete:
      tags: [MCP]
      summary: Delete MCP server
      description: Removes an MCP server and rebuilds the registry.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Server deleted.
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ─── Agent config ─────────────────────────────────────────────────────────
  /api/v1/agents:
    get:
      tags: [Agents]
      summary: List configured agents
      description: Returns the list of agent providers configured in the orchestrator.
      responses:
        '200':
          description: Agent provider list.
          content:
            application/json:
              schema:
                type: object
                properties:
                  agents:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/config/agents:
    get:
      tags: [Agents]
      summary: Get agent config
      description: Returns command mappings, default provider, and max_turns.
      responses:
